body:
  text: 東浦詞金韓玉撰水調歌頭張魏公生日間世真賢出吉兆夢維熊玉麟天上謫見幃薄貫長虹追念當年籌算封魏封留勳業千古事攸同語云仁者夀何必喻喬松嗣天子乘九五馭飛龍分麾契符閫外憑倚定寰中由是天才英縱散入樞庭閒暇談笑撫兵戎佇看金柝靜金鼎篆元功又自廣中出過廬陵贈歌姬假雲卿有美如花客容飾尚中州玉京杳渺天際與别幾經秋家在金河堤畔身寄白蘋洲末南北兩悠悠休苦話萍梗清泪已難收玉壺酒傾瀲灧聽君謳佇雲却月新弄一曲洗君憂同是天涯淪落何必平生相識相見且遲留明日征帆發風月為君愁又月裏一枝桂不付等閒人昔年霄漢聞道爭者盡輸君衣袖天香猶在風度仙清難老氷雪瑩無塵賦才三十倍論夀八千春夏庭芝周室鳳舜郊麟豈如今日稱瑞皇國再生申聊借濟時霖雨來種重湖桃李和氣一畨新尚聞虛黃閣行看秉洪鈞念奴嬌吳東清勝是吳山蒼翠吳江澄渌靈秀鍾人文物盛歷歷皆非凡俗而況君家風流遺世猶寄山隂曲繼承才業算來真是名族聊恁駐節重湖惠歌仁詠藹豐年圖録行看登庸歸去後誰展髙才相續夀日稱觴一杯千嵗應見蟠桃熟祝君難老為君還更再祝感皇恩廣東與康伯可逺栁緑含煙土膏才透雲海微茫露晴岫故鄉何在夢寐草堂溪友舊時逰賞處誰㩦手塵世利名於身何有老去生涯殢樽酒小橋流水一樹雪香瘦故人今夜月相思否滿江紅重九與張舍人正欲登臨何處好登臨眺望君約我今朝攜酒古臺同上風靜秋郊渾似洗碧空淡覆玻瓈盎夕照外渺渺萬遙山開青嶂龍山事空追想風流㑹今安往我勸君一杯為君髙唱今日謀歡真雅勝休辭痛飲葡萄釀縱黃花明日未凋零非佳賞曲江秋正宮明軒快目正雨過湘溪秋來澤國波面鑑開山光澱拂竹聲搖寒玉鷗鷺戲晚日芰荷動香紅蓛千古興亡意凄凉揚按揚字下舊有方空核譜並無闕字今刪去舟望迷南北髣佛煙籠霧簇認何處當年繡轂沈香花蕚事蕭然傷感宫殿三十六忍聽向晚菱歌依稀猶似新畨曲試與問如今新蒲細栁為誰搖緑一剪梅鏡裏新粧鏡外情小眉幽恨淺緑低橫只怨閒縱繡鞍塵不道天涯縈絆歸程夢裏蘭閨相見驚玉香花瘦春艷盈盈覺來欹枕轉愁人門外瀟瀟風雨三更上西平甲申嵗西度道中作折腰勞彈冠望縱飛蓬笑造化相戲窮通風帆浪槳暮城寒角曉樓鐘暗惜霜雪鬢邉來驚對青銅蕭閒好何時遂門橫水徑穿松有無限杯月襟風區區箇甚帝堯堂下足夔龍不如早問溪山髙養吾慵西江月捍撥聲傳酒緑薔薇面襯宫黃嬌波斜入鬢雲長眉與春山一樣瀟灑不禁疏瘦低回猶似思量桃花梨葉晚隂凉說與三年夢想臨江仙月是銀釭溪是鏡雲霓與作衣裳夜寒獨立竹籬傍粧成那待粉笑罷自生香自古佳人多薄命枉教傲雪凌霜從來林下異閨房何須三弄笛方斷九回腸畨槍子莫把團扇雙鸞隔要看玉溪頭春風客妙處風骨蕭間翠羅金鏤瘦宜窄轉面兩眉攢青山色到此月想精神花似秀質待與不清狂如何得奈何難駐朝雲易成春夢恨又積送上七香車春草碧清平樂贈棊者梅花照雪渾似人清絶香疊紺螺雙背結曾侍霓旌絳節如今却向塵寰碁中寄箇蕭閒縱便阿郎多病也須偷畫春山減字朩蘭花贈歌者香檀素手緩理新詞來伴酒音調凄凉便是無情也斷腸莫歌楊栁記得渭城朝雨後客路茫茫幾度東風春草長行香子一剪梅花一見銷魂況溪橋雪裏前村香傳細蘂春透靈根更水清冷雲黯淡月黃昏幽過溪蘭清勝山礬對東風獨立無言霜寒塞壘風靜譙門聽角聲悲笛聲怨恨難論太常引荒山連水水連天憶曾上桂江船風雨過吳川又却在瀟湘岸邉不堪追念浪萍蹤跡虛度夜如年風外曉鐘傳尚獨對殘燈未眠又東城歸路水雲間幾曾放夢魂閒何日整歸鞍又人對西風憑欄溫柔情性繫懷傷感欲訴訴應難愁聚兩眉端又疊起千山萬山賀新郎栁外鶯聲碎晚晴天東風力軟嫩寒初退花底覓春春已去時見亂紅飛墜又閒傍闌干十二闌外青山煙縹眇逺連空愁與眉峰對凝望處兩疊翠鴛鴦結帶靈犀佩綺屏深香羅帳小寶檠燈背誰謂彩雲和夢斷青翼阻尋後㑹待都把相思情綴便做錦書難寫恨奈菱花都見人憔悴那更有枕痕淚又詠水仙綽約人如玉試新粧嬌黃半緑漢宫勻注倚傍小欄閒凝竚翠帶風前似舞記洛浦當年儔侣羅襪塵生香冉冉料征鴻微步凌波女驚夢斷楚江滸春工若見應為主忍教都閒亭邃館冷風凄雨待把此花都折取和淚連香寄與須信道離情如許煙水茫茫斜照裏是騷人九辨招魂處千古恨與誰語又睡起簾櫳靜啓金鋪春幃半捲寶香煙冷門外落花風不定糝糝亂紅堆徑誰喚做春愁如病零亂雲鬟慵梳掠傍菱花羞對孤鸞影情易感恨難醒沙邉栁外當時景記分攜離筵乍闋去帆初整盡舉棹歌和淚聽雲淡水寒煙暝空愴望樓髙天逈猶未歸來何處也日長時不念人孤冷書謾寫鴈誰倩水調歌頭上辛幼安生日重午日過六靈嶽再生申丰神英毅端是天上謫仙人夙藴機權才略早嵗來歸明聖驚聳漢庭臣言語妙天下名德冠朝紳繡衣節移方面政如神九重隆眷倚注偉業富經綸聞道山東出相行拜紫泥飛詔歸去秉洪鈞夀嘏自天鍚安用擬莊椿且坐令閒院落誤了清明約杏花雨過胭脂綽緊了秋千索鬬草人歸朱門悄掩梨花寂寞書萬紙恨憑誰託才封了又揉却寃家何處貪歡樂引得我心兒惡怎生全不思量著那人人情薄才封了一本作剛匆匆封了風入松栁隂亭院杏梢長依約巫陽鳳簫已逺秦樓在水沉煙暖全香臨鏡舞鸞窺沼倚筝飛鴈排行醉邉人去自凄凉淚眼愁腸斷雲殘雨當年事到而今好處難忘兩袖曉風花陌一簾夜雨蘭堂鷓鴣天披拂芝蘭便斷金頓成南北豈勝任三年尊酒半生話千里雲山一寸心休悵望莫登臨夢魂何處不相尋柔腸欲問愁多少未比湘江烟水深又愛日烘晴旬日間謾邀朋輩為躋攀無窮望眼無窮恨不盡長江不盡山星㸃㸃月團團倒流河漢入杯盤飽吟風月三千首寄與吳姬忍淚看生查子裙拖簇石榴髻綰偏荷葉頭上短金叉輕重還相壓輕顰月入眉淺笑花生頰夫壻不風流取次看承别卜算子楊栁緑成隂初過寒食節門掩金鋪獨自眠那更闕寒夜强起立東風慘慘梨花謝何事王孫不早歸寂寞秋千月霜天曉月竹籬茅屋一樹扶疏玉客裏十分清絶有人在江南北竚目詩思促翠袖倚修竹不是月媒風聘誰人與伴幽獨
