body:
  text: 提要東浦詞詞曲類一詞集之屬臣等謹案東浦詞一巻舊本題宋韓玉撰考元好問中州集玉字温甫北平人仕金為翰林應奉文字後為鳯翔府判官則當作金人題宋為誤惟金人著作宋人多不著録而陳振孫書録解題乃載有東浦詞一巻考集中有張魏公生旦上辛幼安生日自廣中出過廬陵贈歌姬段雲卿水調歌頭三首廣東與康伯可感皇恩一首蓋初在宋而後入金此巻乃在宋所作先已流傳故宋人著於録也毛晉既刋其詞入宋人中又詆其雖與康與之辛棄疾倡和相去不止苧蘿無鹽今觀其詞雖慶賀諸篇不免俗濫晉所摘且坐令中二句亦體近北曲誠非佳製然宋人詞内此類至多何獨刻責於玉且集中如感皇恩減字木蘭花賀新郎諸作未嘗不凄清宛轉何擯置不道而獨糾其寃家何處二語蓋明人一代之積習無不重南而輕北内宋而外金晉直以畛域之見曲相排詆非真出於公論也又鄙薄既深校讐彌畧如水調歌頭第二首前闋容飾尚中州句飾字訛為飭字曲江秋前闋凄凉颺舟句本無遺脱乃於颺字下加一方空後闋瀟然傷句傷字下當脱一字乃反不以方空記之一剪梅前闋只怨間縱繡鞍塵句怨字據譜不宜仄上西平調即金人捧露盤前闋暗惜霜雪句惜字據譜亦不宜仄後闋不知早句早字下據譜尚脱一字賀新郎第三首後闋冷字韻複當屬訛字一剪梅花一詞調名行香子乃誤作竹香子不知竹香子别有一調與此逈異上辛幼安之水調歌頭誤脱一頭字遂不與水調歌頭並載而别立一水調歌之名排比㕘錯備極譌舛晉刻宋詞獨此集稱托友人校讐殆亦自知其疎漏歟至賀新郎詠水仙以玉曲與注女並叶卜算子以夜謝與食月並叶則由玉㕘同土音如林外之以埽叶鎖黄庭堅之以笛叶竹非校讐之過矣孏窟詞詞曲類一詞集之屬臣等謹案孏窟詞一巻宋侯寘撰案陳振孫書録解題寘字彦周東武人紹興中以直學士知建康今考集中有戲用賀方回韻餞别朱少章詞則其人當在南宋之初而眼兒媚詞題下注曰效易安體易安為李清照之號亦紹興初人寘已稱效殆猶杜牧李商隠集中效沈下賢體之例耶又有為張敬夫直閣夀詞中秋上劉恭甫舍人詞皆孝宗時人而壬午元旦一詞實為孝宗改元之前一年則乾道淳熙間其人尚存振孫特舉其為官之嵗耳寘為晁氏之甥猶有元祐舊家流風餘韻故交游皆勝流其詞亦婉約嫻雅無酒樓歌館簪舄狼藉之態雖名不甚著而在南宋諸家之中要不能不推為作者文獻通考著録一巻與今本同毛晉嘗刻之六十家詞中校讐頗為疏漏其最甚者如秦樓月即憶秦娥因李白詞中有秦娥夢斷秦樓月句後人因改此名本屬雙調晉所刻於前闋之未脱去一笛字與後闋聨屬為一遂似此調别有此體殊為舛誤他如水調歌頭之歡傾擁旌旄傾字不應作平青玉案之咫尺清明三月暮暮字與前闋韻複又冉冉年元真暗度句元字文義不可解而遥天奉翠華引一首尤訛誤幾不可讀今無别本可校其可改正者改正之不可考者則姑仍其舊云乾隆四十四年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
