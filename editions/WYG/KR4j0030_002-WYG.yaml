front:
  text: 東浦詞原䟦韓温甫家於東浦因以名其詞雖與康順庵辛稼軒諸家酬唱其妍媸相去非亶苧蘿無塩也余去冬日事畚臿研田乆蕪托友人較讐諸詞集以行世入年讀之如兹集開巻水調歌頭為之掩鼻又且坐令其自度曲也押韻頗峭但寃家何處貪歡樂引得我心兒惡等語又未免俳笑矣古虞毛晉識
